name: Build DRAGONIC Guard Parent APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json from secret (if set)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
            echo "✅ google-services.json decoded from secret"
          else
            echo "⚠️ Using placeholder google-services.json (Firebase disabled)"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonic-guard-parent-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        run: |
          echo "✅ Build berhasil!"
          ls -lh app/build/outputs/apk/debug/
